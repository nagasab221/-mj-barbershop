<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <pattern id="pin5" width="26" height="10" patternUnits="userSpaceOnUse">
      <rect width="1" height="10" fill="#f5f3ef" opacity="0.045"/>
    </pattern>
    <clipPath id="poleClip">
      <rect x="330" y="330" width="140" height="380" rx="70"/>
    </clipPath>
  </defs>
  <rect width="800" height="1000" fill="#121114"/>
  <rect width="800" height="1000" fill="url(#pin5)"/>
  <rect x="42" y="42" width="716" height="916" fill="none" stroke="#f5f3ef" stroke-opacity="0.12"/>
  <rect x="56" y="56" width="688" height="888" fill="none" stroke="#f5f3ef" stroke-opacity="0.05"/>

  <!-- barber pole -->
  <g clip-path="url(#poleClip)">
    <g stroke-width="26">
      <path d="M270 400 L530 300" stroke="#c9a86a"/>
      <path d="M270 480 L530 380" stroke="#f5f3ef" stroke-opacity="0.55"/>
      <path d="M270 560 L530 460" stroke="#c9a86a"/>
      <path d="M270 640 L530 540" stroke="#f5f3ef" stroke-opacity="0.55"/>
      <path d="M270 720 L530 620" stroke="#c9a86a"/>
      <path d="M270 800 L530 700" stroke="#f5f3ef" stroke-opacity="0.55"/>
    </g>
  </g>
  <rect x="330" y="330" width="140" height="380" rx="70" fill="none" stroke="#c9a86a" stroke-width="6"/>
  <!-- caps -->
  <circle cx="400" cy="286" r="20" fill="none" stroke="#c9a86a" stroke-width="5"/>
  <path d="M400 306 v24" stroke="#c9a86a" stroke-width="5" stroke-linecap="round"/>
  <circle cx="400" cy="754" r="20" fill="none" stroke="#c9a86a" stroke-width="5"/>
  <path d="M400 710 v24" stroke="#c9a86a" stroke-width="5" stroke-linecap="round"/>

  <text x="400" y="880" text-anchor="middle" fill="#c9a86a" font-family="Georgia, serif" font-size="30" letter-spacing="10">MJ</text>
</svg>
